<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scraft</title>

    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            padding: 20px;
            user-select: none;
        }

        #secretMessage {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        #secretMessage.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <h1>Scraft has Shut Down until the next School Year</h1>

    <div id="secretMessage">
        Thank you to Tarian and Gregory for playing!<br>
        Made by Jace R. H. Cunningham.
    </div>

    <script>
        let clickCount = 0;
        let clickTimer;

        function handleTripleClick() {
            clickCount++;

            clearTimeout(clickTimer);

            clickTimer = setTimeout(() => {
                clickCount = 0;
            }, 600);

            if (clickCount === 3) {
                clickCount = 0;

                const msg = document.getElementById("secretMessage");
                msg.classList.add("show");

                setTimeout(() => {
                    msg.classList.remove("show");
                }, 5000);
            }
        }

        document.addEventListener("click", handleTripleClick);
        document.addEventListener("touchstart", handleTripleClick);
    </script>

</body>
</html>
